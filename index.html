<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Scatter Auto Checker</title>
  <style>
    body { font-family: sans-serif; padding: 15px; width: 420px; background: #3b0000; color: #fff5e1; }
    .main-container { border: 2px solid #d4af37; padding: 15px; border-radius: 10px; background: rgba(0,0,0,0.5); }
    h3 { text-align: center; color: #ffd700; }
    input, textarea { width: 100%; padding: 8px; margin: 5px 0; background: #222; border: 1px solid #d4af37; color: #fff; border-radius: 5px; box-sizing: border-box; }
    button { width: 100%; padding: 10px; background: linear-gradient(90deg, #b30000, #ff3b3b); color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; margin-top: 10px; }
    table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 12px; }
    th, td { border: 1px solid #555; padding: 5px; text-align: center; }
    th { background: #800; }
    #status { font-style: italic; text-align: center; margin: 10px 0; color: #ffdf8c; }
    .btn-group { display: flex; gap: 5px; }
    #copyBtn { background: #cfa300; color: #000; }
    #clearBtn { background: #666; }
  </style>
</head>
<body>
  <div class="main-container">
    <h3>🐉 Scatter Checker 🧧</h3>
    <input type="text" id="adminUrl" placeholder="URL Admin (Contoh: https://admin.com/history)">
    <div style="display: flex; gap: 5px;">
      <input type="date" id="startDateInput">
      <input type="date" id="endDateInput">
    </div>
    <textarea id="txData" placeholder="UserID [Spasi] TxID (Per baris)"></textarea>
    <button id="startBtn">🔮 MULAI PROSES BATCH</button>
    <p id="status">Siap.</p>
    <table>
      <thead>
        <tr>
          <th>User</th>
          <th>TxID</th>
          <th>Bet</th>
          <th>Status/Scatter</th>
        </tr>
      </thead>
      <tbody id="resultBody">
        <tr><td colspan="4">Belum ada data</td></tr>
      </tbody>
    </table>
    <div class="btn-group">
      <button id="copyBtn">📜 SALIN</button>
      <button id="clearBtn">🧹 HAPUS</button>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
